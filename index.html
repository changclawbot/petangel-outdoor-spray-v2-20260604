<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>毛天使戶外防蟲噴霧｜第二版多情境候選稿</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1c211b;
      --muted: #5e685c;
      --line: #dfe7d8;
      --leaf: #587b49;
      --soft: #f5f7f0;
      --paper: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--soft);
      letter-spacing: 0;
    }
    header {
      padding: 28px 20px 18px;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
    }
    .wrap {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1.12;
      font-weight: 800;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .tag {
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fbfcf8;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    main { padding: 24px 0 40px; }
    .grid {
      display: grid;
      gap: 18px;
    }
    .shot {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .shot img {
      width: 100%;
      display: block;
      background: #eef2ea;
    }
    .caption {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px 16px;
      border-top: 1px solid var(--line);
      align-items: flex-start;
    }
    .caption strong {
      display: block;
      margin-bottom: 4px;
      font-size: 16px;
    }
    .caption span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }
    .badge {
      flex: 0 0 auto;
      color: #fff;
      background: var(--leaf);
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 700;
    }
    .note {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }
    @media (min-width: 900px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
      .caption { min-height: 132px; }
    }
    @media print {
      body { background: #fff; }
      header { padding-top: 18px; }
      main { padding-top: 18px; }
      .grid { grid-template-columns: 1fr; }
      .shot { break-inside: avoid; margin-bottom: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>毛天使戶外防蟲噴霧｜第二版多情境候選稿</h1>
      <div class="note">交付時間：2026-06-04。這批先集中呈現目前已生成的第二版多情境視覺，用於審稿、挑圖與後續 landing page / 社群圖卡重排。</div>
      <div class="meta">
        <div class="tag">戶外散步</div>
        <div class="tag">草地休息</div>
        <div class="tag">旅行出門準備</div>
        <div class="tag">Facebook / Landing Page 候選素材</div>
      </div>
    </div>
  </header>
  <main>
    <div class="wrap">
      <section class="grid" aria-label="候選圖">
        <article class="shot">
          <img src="assets/petangel-v2-multi-scene---db51b7a2-d833-4ff5-bc1a-e0966aa2d120.png" alt="毛天使第二版多情境候選圖 A">
          <div class="caption">
            <div><strong>候選 A</strong><span>多段式 campaign 構圖，產品與戶外、草地、出門情境連在一起。</span></div>
            <div class="badge">A</div>
          </div>
        </article>
        <article class="shot">
          <img src="assets/petangel-v2-multi-scene---b6d35d01-ce3f-443a-9c2b-18690a64c912.png" alt="毛天使第二版多情境候選圖 B">
          <div class="caption">
            <div><strong>候選 B</strong><span>保留生活感與自然光，適合延伸成首頁主視覺與社群導購圖。</span></div>
            <div class="badge">B</div>
          </div>
        </article>
        <article class="shot">
          <img src="assets/petangel-v2-multi-scene---a0456907-2e3a-4c4c-ac25-90a77f88545a.png" alt="毛天使第二版多情境候選圖 C">
          <div class="caption">
            <div><strong>候選 C</strong><span>戶外旅行感較強，可作為露營、出遊、散步主題素材方向。</span></div>
            <div class="badge">C</div>
          </div>
        </article>
      </section>
    </div>
  </main>
</body>
</html>
